<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <title>Reuters Yesterday + English Only</title>
  <script>
    function tokyoMDY(daysOffset) {
      const tz = "Asia/Tokyo";
      const fmt = new Intl.DateTimeFormat("en-CA", {
        timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit"
      });

      const todayTokyo = fmt.format(new Date()); // YYYY-MM-DD
      const base = new Date(`${todayTokyo}T00:00:00+09:00`);
      const target = new Date(base.getTime() + daysOffset * 86400000);

      const ymd = fmt.format(target);
      const [y, m, d] = ymd.split("-");
      return `${Number(m)}/${Number(d)}/${y}`; // M/D/YYYY
    }

    window.onload = function () {
      const mdY = tokyoMDY(-1); // yesterday in Tokyo time

      const keywords =
        '("global warming" OR "climate change" OR energy OR SDGs OR ESG OR carbon OR hydrogen OR ammonia OR renewable OR gas OR "green energy" OR "clean energy" OR emissions OR "net zero")';

      // Exclude Japanese Reuters domain; optionally exclude jp/ja in URL if needed
      const q =
        `site:reuters.com -site:jp.reuters.com ${keywords}`;

      const tbs = `cdr:1,cd_min:${mdY},cd_max:${mdY}`;

      // Force English language results (lr=lang_en) and English UI (hl=en)
      const url =
        "https://www.google.com/search?q=" + encodeURIComponent(q) +
        "&tbs=" + encodeURIComponent(tbs) +
        "&lr=lang_en&hl=en";

      location.replace(url);
    };
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
